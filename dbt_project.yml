name: nyc_311_project
version: '1.0.0'
config-version: 2

profile: 'nyc_311_project'   # must match the profile name in profiles.yml

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]        # generic SQL tests live in tests/
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  nyc_311_project:
    staging:
      +materialized: view       # lightweight views that mirror raw data; rebuilt on every dbt run
      +schema: staging
    intermediate:
      +materialized: view       # reusable transformation logic; not exposed to dashboards directly
      +schema: intermediate
    marts:
      +materialized: table      # final analytics tables queried by Looker Studio / Streamlit
      +schema: marts
